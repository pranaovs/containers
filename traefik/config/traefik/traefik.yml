global:
  sendAnonymousUsage: true

api:
  dashboard: true
  insecure: true
  debug: false

entryPoints:
  web:
    address: ":80"
    forwardedHeaders:
      trustedIPs:
        - "127.0.0.1/32" # Localhost from nginx
        - "10.0.0.0/8" # Podman gateway range
        - "100.64.0.0/10" # Tailscale IP Range

  websecure:
    address: ":443"
    proxyProtocol:
      trustedIPs:
        - "127.0.0.1/32" # Localhost from nginx
        - "10.0.0.0/8" # Podman gateway range

    http:
      tls:
        certResolver: le
      middlewares:
        - crowdsec@docker
        - hsts@file
        - nosniff@file
        - frame-options@file
        - referrer-policy@file

serversTransport:
  insecureSkipVerify: true

providers:
  docker:
    exposedByDefault: false
    endpoint: "unix:///var/run/docker.sock"
  file:
    filename: /security.yml
    watch: true

certificatesResolvers:
  le:
    acme:
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO # can be DEBUG, INFO, WARN, ERROR
  format: common # or json
  filePath: "" # empty means stdout

accessLog:
  format: json # or json
  # bufferingSize: 0 # disable buffering, send directly to stdout
  filePath: /var/log/traefik/access-raw.log
  # Timezone specific
  fields:
    # Keep all the fields by default
    defaultMode: keep
    names:
      StartUTC: drop
    headers:
      # Keep all the headers by default
      defaultMode: keep
      names:
        Authorization: drop

experimental:
  plugins:
    crowdsec-bouncer:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: "v1.4.7"
