services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always
    ports:
      - "30087:80"
    expose:
      - "80"
    volumes:
      - ./vw-data/:/data/
    environment:
      DOMAIN: "https://vaultwarden.pranaovs.me"
      SIGNUPS_ALLOWED: false
    env_file:
      - .env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      # Traefik
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vaultwarden.pranaovs.me`) || Host(`bitwarden.pranaovs.me`) || Host(`passwords.pranaovs.me`)"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls=true"
      - "traefik.http.routers.vaultwarden.tls.certresolver=le"
      # AutoKuma (uptime-kuma)
      - "kuma.vaultwarden.group.name=Vaultwarden"
      - "kuma.vaultwarden.http.0.name=Vaultwarden (vaultwarden.pranaovs.me)"
      - "kuma.vaultwarden.http.0.url=https://vaultwarden.pranaovs.me"
      - "kuma.vaultwarden.http.0.parent_name=vaultwarden.group"
      - "kuma.vaultwarden.http.1.name=Vaultwarden (bitwarden.pranaovs.me)"
      - "kuma.vaultwarden.http.1.url=https://bitwarden.pranaovs.me"
      - "kuma.vaultwarden.http.1.parent_name=vaultwarden.group"
      - "kuma.vaultwarden.http.2.name=Vaultwarden (passwords.pranaovs.me)"
      - "kuma.vaultwarden.http.2.url=https://passwords.pranaovs.me"
      - "kuma.vaultwarden.http.2.parent_name=vaultwarden.group"
      - "kuma.vaultwarden.docker.name=vaultwarden (container)"
      - "kuma.vaultwarden.docker.docker_container=vaultwarden"
      - "kuma.vaultwarden.docker.docker_host_name=local"
      - "kuma.vaultwarden.docker.parent_name=vaultwarden.group"
    networks:
      - traefik_net

networks:
  traefik_net:
    external: true
