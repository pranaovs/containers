services:
  bentopdf:
    image: bentopdf/bentopdf-simple:latest
    container_name: bentopdf
    ports:
      - "30085:8080"
    restart: always
    labels:
      # Watchtower
      - "com.centurylinklabs.watchtower.enable=true"
      # Traefik
      - "traefik.enable=true"
      - "traefik.http.routers.bentopdf.rule=Host(`pdftools.pranaovs.me`) || Host(`pdf.pranaovs.me`) || Host(`bentopdf.pranaovs.me`)"
      - "traefik.http.services.bentopdf.loadbalancer.server.port=8080"
      - "traefik.http.routers.bentopdf.entrypoints=websecure"
      - "traefik.http.routers.bentopdf.tls=true"
      - "traefik.http.routers.bentopdf.tls.certresolver=le"
      # AutoKuma (uptime-kuma)
      - "kuma.bentopdf.group.name=BentoPDF"
      - "kuma.bentopdf.http.0.name=BentoPDF (pdftools.pranaovs.me)"
      - "kuma.bentopdf.http.0.url=https://pdftools.pranaovs.me"
      - "kuma.bentopdf.http.0.parent_name=bentopdf.group"
      - "kuma.bentopdf.http.1.name=BentoPDF (pdf.pranaovs.me)"
      - "kuma.bentopdf.http.1.url=https://pdf.pranaovs.me"
      - "kuma.bentopdf.http.1.parent_name=bentopdf.group"
      - "kuma.bentopdf.http.2.name=BentoPDF (bentopdf.pranaovs.me)"
      - "kuma.bentopdf.http.2.url=https://bentopdf.pranaovs.me"
      - "kuma.bentopdf.http.2.parent_name=bentopdf.group"
      - "kuma.bentopdf.docker.name=bentopdf (container)"
      - "kuma.bentopdf.docker.docker_container=bentopdf"
      - "kuma.bentopdf.docker.docker_host_name=local"
      - "kuma.bentopdf.docker.parent_name=bentopdf.group"
    networks:
      - traefik_net

networks:
  traefik_net:
    external: true
